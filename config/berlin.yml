  - name: SO36
    url: https://www.so36.com/
    item: div.nav-wrap li
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "SO36"
      - name: "sourceUrl"
        value: "https://www.so36.com/"
      - name: title
        type: text
        location:
          - selector: a
        transform:
          - type: regex-replace
            regex: "^Tickets "
            replace: ""
          - type: regex-replace
            regex: " in Berlin am [0-9.]+$"
            replace: ""
      - name: url
        type: url
        location:
          - selector: a
            attr: href
      - name: imageUrl
        type: url
        location:
          - selector: img[src*="/hero_image/"]
            attr: src
        on_subpage: url
        can_be_empty: true
      - name: date
        type: date
        on_subpage: url
        components:
          - covers:
              day: true
              month: true
              year: true
              time: true
            location:
              selector: script[type='application/ld+json']
              json_selector: "//startDate"
            layout:
              - "2006-01-02T15:04:05-07:00"
        date_location: "Europe/Berlin"
    filters:
      - field: url
        exp: ".*/produkte/.*"
        match: true

  - name: Lido
