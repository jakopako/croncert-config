scrapers:
  - name: AstraKulturhaus
    url: https://www.astra-berlin.de/
    item: article.event
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Astra Kulturhaus"
      - name: "sourceUrl"
        value: "https://www.astra-berlin.de/"
      - name: eventCategory
        type: text
        location:
          - selector: div.event__kind div.event__label
        hide: true
        can_be_empty: true
      - name: title
        type: text
        location:
          - selector: h1.event__title > a
      - name: url
        type: url
        location:
          - selector: h1.event__title > a
            attr: href
      - name: imageUrl
        type: url
        location:
          - selector: img.image__src
            attr: src
        on_subpage: url 
        can_be_empty: true
      - name: comment
        type: text
        location:
          - selector: div.gig__description > p
        entire_subtree: true
        can_be_empty: true
        on_subpage: url
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
              time: true
            location:
              attr: data-realdate 
            layout:
              - "2006-01-02 15:04:05 -0700 "
        date_location: "Europe/Berlin"
    filters:
      - field: eventCategory
        exp: "Konzert|Musik|Concert|Music"
        match: true

  - name: Gretchen
    url: https://www.gretchen-club.de/
    item: body.normal.start > div.block > div.start > div > div.dates > div.gig
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Gretchen"
      - name: "sourceUrl"
        value: "https://www.gretchen-club.de/"
      - name: title
        location:
          selector: div.gig_main > div.scroll.nano > div.text.nano-content > span.title > h2 > a
      - name: url
        type: url
        location:
          selector: div.gig_main > div.scroll.nano > div.text.nano-content > span.title > h2 > a
          attr: href
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: div.gig_top > span.date > strong
            layout: ["2.1.2006"]
          - covers:
              time: true
            location:
              selector: div.gig_top > span.date
              regex_extract:
                exp: "(Show|Doors): [0-9\\.]+"
              entire_subtree: true
            layout: ["Show: 15", "Show: 15.04", "Doors: 15.04"]
        date_location: "Europe/Berlin"
    filters:
      - field: "title"
        exp: ".*CANCELLED"
        match: false

  - name: HuxleysNeueWelt
    url: https://huxleysneuewelt.de/events
    item: ul > li.event-item
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Huxleys Neue Welt"
      - name: "sourceUrl"
        value: https://huxleysneuewelt.com/shows
      - name: title
        type: text
        location:
          - selector: div.details > .eventname
      - name: url
        type: url
        location:
          - attr: href
            selector: a
      - name: date
        type: date
        components:
          - covers:
              time: true
            location:
              selector: div.details > div.time
              regex_extract:
                exp: "Beginn: [0-9]{2}[:\\.]{1}[0-9]{2}"
            layout:
              - "Beginn: 15:04"
              # - "Einlass: 15.04"
          - covers:
              month: true
            location:
              selector: div.date > span
            layout:
              - Jan
              - "Jan."
            transform:
              - type: regex-replace
                regex: Mrz
                replace: Mär
              - type: regex-replace
                regex: März
                replace: Mär
          - covers:
              day: true
            location:
              selector: div.date
            layout:
              - "2"
        date_location: CET
        date_language: de_DE
        guess_year: true

  - name: Metropol
    url: https://metropol-berlin.de/events
    item: div.wrapper > div.pagecontent > div.container.grid-container.grid-parent.hfeed.site > div.site-content > div.content-area.grid-100.grid-parent.mobile-grid-100.tablet-grid-100 > main.site-main > article.has-post-thumbnail.page.post-11.status-publish.type-page > div.inside-article > div.entry-content > div > div.em.em-view-container > div.em-events-list.em-list > ul.eventlist > li.event
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Metropol"
      - name: "sourceUrl"
        value: https://metropol-berlin.de/events
      - name: title
        type: text
        location:
          - selector: div.main:nth-child(2) > a.title > h2.artist
      - name: url
        type: url
        location:
          - selector: div.main:nth-child(2) > a.title
            attr: href
      - name: comment
        type: text
        location:
          - selector: div.date > ul.event-categories > li > a
      - name: date
        type: date
        components:
          - covers:
              time: true
            location:
              selector: div.date > span.time
            layout:
              - "15:04"
          - covers:
              month: true
              year: true
            location:
              selector: div.date > span.monthyear
            layout:
              - Jan. 2006
              - Jan.. 2006
          - covers:
              day: true
            location:
              selector: div.date > span.day
            layout:
              - 2/
        date_location: CET
        date_language: de_DE

  - name: PeppiGuggenheim
    url: https://www.peppi-guggenheim.de/?post_type=tribe_events
    item: div.tribe-common-g-col.tribe-events-calendar-list__event-details
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Gretchen"
      - name: "sourceUrl"
        value: "https://www.peppi-guggenheim.de/?post_type=tribe_events"
      - name: title
        type: text
        location:
          - selector: h3.tribe-common-h4--min-medium.tribe-common-h6.tribe-events-calendar-list__event-title > a.tribe-common-anchor-thin.tribe-events-calendar-list__event-title-link
      - name: comment
        location:
          - selector: div > p
        can_be_empty: true
      - name: url
        type: url
        location:
          - selector: h3.tribe-common-h4--min-medium.tribe-common-h6.tribe-events-calendar-list__event-title > a.tribe-common-anchor-thin.tribe-events-calendar-list__event-title-link
            attr: href
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              time: true
            location:
              selector: div.tribe-common-b2.tribe-events-calendar-list__event-datetime-wrapper > time.tribe-events-calendar-list__event-datetime > span.tribe-event-date-start
            layout:
              - January 2 @ 15:04
        date_location: CET
        date_language: de_DE
        guess_year: true

  - name: Lido
    url: https://www.lido-berlin.de/
    item: div.page > div.event-list > article.event-ticket
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Lido"
      - name: "sourceUrl"
        value: "https://www.lido-berlin.de/"
      - name: eventType
        type: text
        location:
          - selector: div.event-ticket__type > div.event-ticket__type__label
        hide: true
        can_be_empty: true
      - name: title
        type: text
        location:
          - selector: div.event-ticket__content > h1.event-ticket__content__title > a
      - name: url
        type: url
        location:
          - selector: div.event-ticket__content > h1.event-ticket__content__title > a
            attr: href
      - name: date
        type: date
        components:
          - covers:
              time: true
            location:
              selector: div.event-ticket__meta > div.event-ticket__meta__times > div.event-ticket__meta__times__time:nth-child(2) > div.event-ticket__meta__times__time__value
            layout:
              - "15:04"
          - covers:
              day: true
              month: true
            location:
              selector: div.event-ticket__meta.event-ticket__meta--mobile > div.event-ticket__meta__date > div.event-ticket__meta__date__day-month
            layout:
              - 2.1.
          - covers:
              year: true
            location:
              selector: div.event-ticket__meta.event-ticket__meta--desktop > div.event-ticket__meta__date > div.event-ticket__meta__date__year
            layout:
              - "2006"
        date_location: CET
    filters:
      - field: eventType
        match: false
        exp: Party

  - name: Monarch
    url: https://kottimonarch.de/programm.php
    item: body > div.breite > div.nachrichten > div > div
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Monarch"
      - name: "sourceUrl"
        value: "https://kottimonarch.de/programm.php"
      - name: title
        type: text
        location:
          - selector: table > tbody > tr > td > b > div
            # examples: [INDIE GROUND, SHANE TODD (COMEDY), BREEZE X FLIRT RECORDS, POLLYESTER AND THE WORLD DOMINATION (KONZERT)]
            regex_extract:
              exp: "[^\\(]+"
              index: 0
      - name: url
        type: url
        location:
          - selector: a
            attr: href
            default: https://kottimonarch.de/programm.php
            # examples: ['https://loveyourartist.com/en/profiles/spokes-gmbh-5OQQ41/events/shane-todd-hold-me-back-berlin-FKX5K3', 'https://www.tixforgigs.com/Event/71706', 'https://www.eventbrite.co.uk/e/triple-entendre-indiesoulhip-hop-tickets-1981477939858?aff=oddtdtcreator', 'https://loveyourartist.com/de/profiles/dynamite-konzerte-CK59OW/events/konrad-kuchenmeister-berlin-KWI1QN']
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
              time: true
            location:
              selector: b
              # examples: ['Donnerstag 26/02/2026-21:00', 'Freitag 27/02/2026-18:00', 'Freitag 27/02/2026-23:00', 'Donnerstag 05/03/2026-20:00']
            layout:
              - Monday 2/1/2006-15:04
        date_location: CET
        date_language: de_DE
    fetcher:
      type: static

  - name: Schokoladen
    url: https://schokoladen-mitte.de/
    item: div.event
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Schokoladen"
      - name: "sourceUrl"
        value: "https://schokoladen-mitte.de/"
      - name: "url"
        value: "https://schokoladen-mitte.de/"
      - name: category
        type: text
        location:
          - selector: h6
        hide: true
        can_be_empty: true
      - name: imageUrl
        type: url
        can_be_empty: true
        location:
          - selector: div.event-info img
            attr: src
      - name: title
        type: text
        location:
          - selector: div.title div.event-header h2
      - name: comment
        type: text
        location:
          - selector: div.event-description
            entire_subtree: true
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: div.event-info
              attr: data-event-date
            layout:
              - "2006-01-02"
          - covers:
              time: true
            location:
              selector: div.event-info > div > div > div.col-md-3 > div > p > span
              regex_extract:
                exp: "[0-9]{2}(h|:)[0-9]{0,2}?$"
            layout:
              - "15h"
              - "15:04"
            can_be_empty: true
        date_location: "Europe/Berlin"
    fetcher:
      type: dynamic
      page_load_wait_ms: 2000
    filters:
      - field: category
        exp: "Musik|Konzert|Music|Concert"
        match: true
