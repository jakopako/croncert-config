scrapers:
  - name: AstraKulturhaus
    url: https://www.astra-berlin.de/
    item: article.event
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Astra Kulturhaus"
      - name: "sourceUrl"
        value: "https://www.astra-berlin.de/"
      - name: eventCategory
        type: text
        location:
          - selector: div.event__kind div.event__label
        hide: true
        can_be_empty: true
      - name: title
        type: text
        location:
          - selector: h1.event__title > a
      - name: url
        type: url
        location:
          - selector: h1.event__title > a
            attr: href
      - name: imageUrl
        type: url
        location:
          - selector: img.image__src
            attr: src
        on_subpage: url
        can_be_empty: true
      - name: comment
        type: text
        location:
          - selector: div.gig__description > p
        entire_subtree: true
        can_be_empty: true
        on_subpage: url
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
              time: true
            location:
              attr: data-realdate
            layout:
              - "2006-01-02 15:04:05 -0700 "
        date_location: "Europe/Berlin"
    filters:
      - field: eventCategory
        exp: "Konzert|Musik|Concert|Music"
        match: true

  - name: Badehaus
    url: https://badehaus-berlin.com/en/concerts/
    item: div.em-events-list > div
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Badehaus"
      - name: "sourceUrl"
        value: "https://badehaus-berlin.com/en/concerts/"
      - name: title
        type: text
        location:
          - selector: h2 > a
      - name: url
        type: url
        location:
          - selector: h2 > a
            attr: href
      - name: imageUrl
        type: url
        location:
          - selector: img
            attr: src
      - name: comment
        type: text
        location:
          - selector: div.post-content > div > div > p:nth-child(17)
        on_subpage: url
        can_be_empty: true
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: p.eventinfo
              regex_extract:
                exp: "[0-9]{2}\\.[0-9]{2}\\.[0-9]{4}"
            layout:
              - "02.01.2006"
          - covers:
              time: true
            location:
              selector: p.eventinfo
              regex_extract:
                exp: "[0-9]{2}:[0-9]{2} UHR"
            layout:
              - "15:04 UHR"
            can_be_empty: true
        date_location: "Europe/Berlin"

  - name: BFlat
    url: https://b-flat-berlin.de/programm
    item: div.summary-item
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "B Flat"
      - name: "sourceUrl"
        value: "https://b-flat-berlin.de/programm"
      - name: "title"
        location:
          - selector: div.summary-title > a
      - name: url
        type: url
        location:
          - selector: div.summary-title > a
            attr: href
      - name: comment
        type: text
        on_subpage: url
        location:
          - selector: div.sqs-html-content > p
            all_nodes: true
            separator: "\n"
      - name: imageUrl
        type: url
        location:
          - selector: div.img-wrapper > img
            attr: data-src
      - name: date
        type: date
        on_subpage: url
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: div.eventitem-column-meta > ul > li > time
              attr: datetime
            layout: ["2006-01-02"]
          - covers:
              time: true
            location:
              default: "20:00"
            layout: ["15:04"]
        date_location: "CET"
        date_language: "de_DE"
    fetcher:
      type: static

  # ─────────────────────────────────────────────────────────────────────────────
  # FRANNZ CLUB (Kulturbrauerei, Schönhauser Allee 36, Prenzlauer Berg)
  # URL: https://www.frannz.de/veranstaltungen/
  # ─────────────────────────────────────────────────────────────────────────────
  - name: FrannzClub
    url: https://www.frannz.de/
    item: article.events
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Frannz Club"
      - name: "sourceUrl"
        value: "https://www.frannz.de/"
      - name: "url"
        value: "https://www.frannz.de/"
      - name: title
        type: text
        location:
          - selector: h2.event-title
      - name: imageUrl
        type: url
        location:
          - selector: div.image > img
            attr: src
      - name: date
        type: date
        components:
          - covers:
              day: true
            location:
              selector: div.event-day
            layout:
              - "02"
          - covers:
              month: true
            location:
              selector: div.event-month
            layout:
              - "January"
          - covers:
              time: true
            location:
              selector: div.event-entrance > strong
            layout:
              - "15:04"
        date_location: "Europe/Berlin"

  - name: Gretchen
    url: https://www.gretchen-club.de/
    item: body.normal.start > div.block > div.start > div > div.dates > div.gig
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Gretchen"
      - name: "sourceUrl"
        value: "https://www.gretchen-club.de/"
      - name: title
        location:
          selector: div.gig_main > div.scroll.nano > div.text.nano-content > span.title > h2 > a
      - name: url
        type: url
        location:
          selector: div.gig_main > div.scroll.nano > div.text.nano-content > span.title > h2 > a
          attr: href
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: div.gig_top > span.date > strong
            layout: ["2.1.2006"]
          - covers:
              time: true
            location:
              selector: div.gig_top > span.date
              regex_extract:
                exp: "(Show|Doors): [0-9\\.]+"
              entire_subtree: true
            layout: ["Show: 15", "Show: 15.04", "Doors: 15.04"]
        date_location: "Europe/Berlin"
    filters:
      - field: "title"
        exp: ".*CANCELLED"
        match: false

  - name: HuxleysNeueWelt
    url: https://huxleysneuewelt.de/events
    item: ul > li.event-item
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Huxleys Neue Welt"
      - name: "sourceUrl"
        value: https://huxleysneuewelt.com/shows
      - name: title
        type: text
        location:
          - selector: div.details > .eventname
      - name: url
        type: url
        location:
          - attr: href
            selector: a
      - name: date
        type: date
        components:
          - covers:
              time: true
            location:
              selector: div.details > div.time
              regex_extract:
                exp: "Beginn: [0-9]{2}[:\\.]{1}[0-9]{2}"
            layout:
              - "Beginn: 15:04"
              # - "Einlass: 15.04"
          - covers:
              month: true
            location:
              selector: div.date > span
            layout:
              - Jan
              - "Jan."
            transform:
              - type: regex-replace
                regex: Mrz
                replace: Mär
              - type: regex-replace
                regex: März
                replace: Mär
          - covers:
              day: true
            location:
              selector: div.date
            layout:
              - "2"
        date_location: CET
        date_language: de_DE
        guess_year: true

  - name: Metropol
    url: https://metropol-berlin.de/events
    item: div.wrapper > div.pagecontent > div.container.grid-container.grid-parent.hfeed.site > div.site-content > div.content-area.grid-100.grid-parent.mobile-grid-100.tablet-grid-100 > main.site-main > article.has-post-thumbnail.page.post-11.status-publish.type-page > div.inside-article > div.entry-content > div > div.em.em-view-container > div.em-events-list.em-list > ul.eventlist > li.event
    fields:
