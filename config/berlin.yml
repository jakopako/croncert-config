  - name: Monarch
    url: https://kottimonarch.de/programm.php
    item: body > div.breite > div.nachrichten > div > div
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Monarch"
      - name: "sourceUrl"
        value: "https://kottimonarch.de/programm.php"
      - name: title
        type: text
        location:
          - selector: table > tbody > tr > td > b > div
            # examples: [INDIE GROUND, SHANE TODD (COMEDY), BREEZE X FLIRT RECORDS, POLLYESTER AND THE WORLD DOMINATION (KONZERT)]
            regex_extract:
              exp: "[^\\(]+"
              index: 0
      - name: url
        type: url
        location:
          - selector: a
            attr: href
            default: https://kottimonarch.de/programm.php
            # examples: ['https://loveyourartist.com/en/profiles/spokes-gmbh-5OQQ41/events/shane-todd-hold-me-back-berlin-FKX5K3', 'https://www.tixforgigs.com/Event/71706', 'https://www.eventbrite.co.uk/e/triple-entendre-indiesoulhip-hop-tickets-1981477939858?aff=oddtdtcreator', 'https://loveyourartist.com/de/profiles/dynamite-konzerte-CK59OW/events/konrad-kuchenmeister-berlin-KWI1QN']
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
              time: true
            location:
              selector: b
              # examples: ['Donnerstag 26/02/2026-21:00', 'Freitag 27/02/2026-18:00', 'Freitag 27/02/2026-23:00', 'Donnerstag 05/03/2026-20:00']
            layout:
              - Monday 2/1/2006-15:04
        date_location: CET
        date_language: de_DE
    fetcher:
      type: static

  - name: Schokoladen
    url: https://schokoladen-mitte.de/
    item: div.event
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Schokoladen"
      - name: "sourceUrl"
        value: "https://schokoladen-mitte.de/"
      - name: "url"
        value: "https://schokoladen-mitte.de/"
      - name: category
        type: text
        location:
          - selector: h6
        hide: true
        can_be_empty: true
      - name: imageUrl
        type: url
        can_be_empty: true
        location:
          - selector: div.event-info img
            attr: src
      - name: title
        type: text
        location:
          - selector: div.title div.event-header h2
      - name: comment
        type: text
        location:
          - selector: div.event-description
            entire_subtree: true
      - name: date
        type: date
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: div.event-info
              attr: data-event-date
            layout:
              - "2006-01-02"
          - covers:
              time: true
            location:
              selector: div.event-info > div > div > div.col-md-3 > div > p > span
              regex_extract:
                exp: "[0-9]{2}(h|:)[0-9]{0,2}?$"
            layout:
              - "15h"
              - "15:04"
            can_be_empty: true
        date_location: "Europe/Berlin"
    fetcher:
      type: dynamic
      page_load_wait_ms: 2000
    filters:
      - field: category
        exp: "Musik|Konzert|Music|Concert"
        match: true

  - name: SilentGreen
    url: https://www.silent-green.net/en/programme
    item: ul.calendar-horizontal.d-flex.justify-content-between.list-unstyled > li.eventDay
    fields:
      - name: "type"
        value: "concert"
      - name: "city"
        value: "Berlin"
      - name: "country"
        value: "Germany"
      - name: "location"
        value: "Silent Green"
      - name: sourceUrl
        type: url
        value: https://www.silent-green.net/en/programme
      - name: url
        type: url
        location:
          - selector: span.d-none.popperContent.tooltipContent > p > a.d-block
            attr: href
            # examples: ['/en/programme/detail/jasmine-wood-pavel-milyakov?tx_news_pi1%5Bday%5D=2&tx_news_pi1%5Bmonth%5D=4&tx_news_pi1%5Byear%5D=2026&cHash=7727afa2e4a92cd3a818d80b3b60da9d', '/en/programme/detail/lucy-kruger-the-lost-boys?tx_news_pi1%5Bday%5D=4&tx_news_pi1%5Bmonth%5D=4&tx_news_pi1%5Byear%5D=2026&cHash=fc14d0e41fe01bcab57716b9638443b7', '/en/programme/detail/juana-molina?tx_news_pi1%5Bday%5D=7&tx_news_pi1%5Bmonth%5D=4&tx_news_pi1%5Byear%5D=2026&cHash=9748e2f8890d669a4f8eeb08ba8044c1', '/en/programme/detail/malibu?tx_news_pi1%5Bday%5D=8&tx_news_pi1%5Bmonth%5D=4&tx_news_pi1%5Byear%5D=2026&cHash=531394439a661c32aa8af1999f635827']
      - name: event-type
        type: text
        location:
          - selector: span.d-none.popperContent.tooltipContent > p > a.d-block > span.cat
            # examples: [Concert, Concert, Concert, Concert]
        can_be_empty: true
      - name: imageUrl
        type: url
        on_subpage: url
        location:
          selector: picture > source
          attr: srcset
      - name: comment
        type: text
        on_subpage: url
        location:
          selector: div.ce-bodytext
          entire_subtree: true
        can_be_empty: true
      - name: date
        type: date
        on_subpage: url
        components:
          - covers:
              day: true
              month: true
              year: true
            location:
              selector: span.event-detail-date-begin
            layout:
              - "Mon 01/02/2006"
          - covers:
              time: true
            location:
              selector: div.container-event-detail-metadata > div > div > span.event-detail-datetime > span.event-detail-time > span.event-detail-time-begin
              default: 08:30 pm Start
            layout:
              - "03:04 pm Start"
              - "03:04 pm -"
      - name: title
        type: text
        location:
          - selector: span.d-none.popperContent.tooltipContent > p > a.d-block > span.title:nth-child(2)
            # examples: [Jasmine Wood + Pavel Milyakov – cancelled, Lucy Kruger & The Lost Boys + Kristof Hahn, Juana Molina – sold out, Malibu]
    paginator:
      location:
        selector: li.arrow-next > a
      max_pages: 12
    fetcher:
      type: static
    filters:
      - field: "event-type"
        exp: "(?i)konzert"
        match: true
      - field: "event-type"
        exp: "(?i)concert"
        match: true

  - name: Quasimodo
