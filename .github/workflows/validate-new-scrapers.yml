name: validate_new_scrapers

on:
  pull_request:
    paths:
      - config/*.yml
      - config/*.yaml

jobs:
  validate-new-scrapers:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Install google chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install goskyr
        run: go install github.com/jakopako/goskyr/cmd/goskyr@v0.9.1

      - name: Validate newly added scrapers
        run: bash .github/scripts/validate-added-scrapers.sh "${{ github.event.pull_request.base.sha }}"
